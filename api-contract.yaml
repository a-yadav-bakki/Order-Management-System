openapi: 3.0.3
info:
  title: Cargoflow OMS API — AI-assisted intake & orders
  version: 1.0.0
  description: >
    Contract for the extraction service and order lifecycle used by the
    Cargoflow OMS console. Authored as a portfolio artifact to demonstrate
    API contract design: request/response payloads, per-field confidence,
    error handling, and lifecycle transitions.
servers:
  - url: https://api.cargoflow.example/v1
    description: Illustrative — not a live endpoint

paths:
  /extractions:
    post:
      summary: Extract a structured order from raw text
      description: >
        Accepts unstructured order text and returns extracted fields, each with a
        confidence score (0–1). Fields that cannot be determined are returned
        empty with low confidence — the service must not fabricate values.
      operationId: extractOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rawText]
              properties:
                rawText:
                  type: string
                  example: "PO# NB-48213\nShip to: Warehouse 4...\n12 x Pallet bracket"
                sourceType:
                  type: string
                  enum: [email, chat, pdf, manual]
                  description: Optional hint about the input format.
      responses:
        "200":
          description: Extraction succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Extraction"
        "422":
          description: Input could not be processed (e.g. empty text)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /orders:
    get:
      summary: List orders
      operationId: listOrders
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/Status"
        - name: q
          in: query
          description: Free-text search over id, customer, reference.
          schema: { type: string }
      responses:
        "200":
          description: A page of orders
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Order" }
    post:
      summary: Create an order
      description: >
        Creates an order from reviewed fields. If any field is below the
        configured confidence threshold, the order is created in `Exception`
        status. A non-empty customer is required.
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/OrderInput" }
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }
        "400":
          description: Validation failed (e.g. missing customer)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /orders/{orderId}/transitions:
    post:
      summary: Transition an order's status
      description: Advance, flag as exception, or resolve an exception.
      operationId: transitionOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [advance, flag_exception, resolve_exception]
                note:
                  type: string
      responses:
        "200":
          description: Transition applied
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Order" }
        "409":
          description: Invalid transition for current status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

components:
  schemas:
    Status:
      type: string
      enum: [New, Confirmed, Picking, Shipped, Delivered, Exception]

    ConfidenceField:
      type: object
      description: An extracted value paired with its confidence (0–1).
      properties:
        value:
          nullable: true
          description: Extracted value, or null/empty if undetermined.
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          example: 0.62
        needsReview:
          type: boolean
          description: True when confidence is below the active threshold.

    Extraction:
      type: object
      properties:
        threshold:
          type: number
          example: 0.80
          description: Confidence threshold applied to compute needsReview.
        fields:
          type: object
          properties:
            customer: { $ref: "#/components/schemas/ConfidenceField" }
            reference: { $ref: "#/components/schemas/ConfidenceField" }
            address: { $ref: "#/components/schemas/ConfidenceField" }
            deliveryDate: { $ref: "#/components/schemas/ConfidenceField" }
            value: { $ref: "#/components/schemas/ConfidenceField" }
            items:
              allOf:
                - $ref: "#/components/schemas/ConfidenceField"
                - type: object
                  properties:
                    value:
                      type: array
                      items: { $ref: "#/components/schemas/LineItem" }
        flaggedCount:
          type: integer
          description: Number of fields below threshold.

    LineItem:
      type: object
      properties:
        qty: { type: integer, example: 12 }
        name: { type: string, example: "Pallet racking bracket" }

    OrderInput:
      type: object
      required: [customer, items]
      properties:
        customer: { type: string, example: "Northbay Retail" }
        reference: { type: string, example: "NB-48213" }
        address: { type: string }
        deliveryDate: { type: string, format: date }
        value: { type: integer, example: 88400 }
        items:
          type: array
          items: { $ref: "#/components/schemas/LineItem" }
        unresolvedFields:
          type: array
          description: Field names still below threshold at creation time.
          items: { type: string }

    Order:
      type: object
      properties:
        id: { type: string, example: "ORD-1044" }
        customer: { type: string }
        reference: { type: string }
        address: { type: string }
        deliveryDate: { type: string, format: date, nullable: true }
        value: { type: integer, nullable: true }
        items:
          type: array
          items: { $ref: "#/components/schemas/LineItem" }
        status: { $ref: "#/components/schemas/Status" }
        flagged: { type: boolean }
        history:
          type: array
          items:
            type: object
            properties:
              stage: { $ref: "#/components/schemas/Status" }
              timestamp: { type: string, format: date-time }
              note: { type: string }

    Error:
      type: object
      properties:
        code: { type: string, example: "CUSTOMER_REQUIRED" }
        message: { type: string, example: "A non-empty customer is required to create an order." }
